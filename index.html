    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Task-Manager</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <header class="title">
            <h1> Task Manager</h1>
        </header>
        <main>
            <section class="container">
                <div class="task-container">
                    <div class="task-form">
                        <label for="task-input">Add a new task: </label>
                        <form id="add-task-form">
                            <input type="text" id="task-input" autocomplete="off" required placeholder="Enter a new task...">
                            <select id="priority-select">
                                <option value="low">Low</option>
                                <option value="medium">Medium</option>
                                <option value="high">High</option>
                            </select>    
                            <button type="button" id="add-task-btn" onclick="addTask()">Add Task</button>
                            <button type="button" id="clear-tasks-btn" onclick="clearTasks()">Clear All</button>
                        </form>
   
                    </div>
                    <div class="task-filter">
                    <button id="Filter-all" onclick="filterTasks('all')">All Tasks</button>
                    <button id="Filter-completed" onclick="filterTasks('completed')">Completed</button>
                    <button id="Filter-incomplete" onclick="filterTasks('incomplete')">Incomplete</button>
                    <button id="Filter-clear" onclick="clearFilter()">Clear Filter</button>
                    </div>  
                    <ul id="task-list">
                        <!--li class = "checked">Task 1</li>
                        <li>Task 2</li>
                        <li>Task 3'</li-->
                    </ul>
                </div>
                      <div class="task-counter">
                        <p>Tasks: <span id="task-count">0</span></p>
                        <p>Completed: <span id="completed-count">0</span></p>
                        <p>Incomplete: <span id="incomplete-count">0</span></p>
                    </div>

            </section>  
        </main>
        <script src="script.js"></script>
    </body>     
    </html>
